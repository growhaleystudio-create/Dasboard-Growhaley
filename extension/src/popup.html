<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Capture Google Maps</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        margin: 0;
        padding: 12px 16px;
        min-width: 280px;
        color: #111;
        background: #fff;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 8px 0;
      }
      .status {
        font-size: 13px;
        line-height: 1.4;
        margin: 0;
      }
      .status-idle {
        color: #555;
      }
      .status-pending {
        color: #92400e;
      }
      .status-capturing {
        color: #1e3a8a;
      }
      .status-sent {
        color: #166534;
      }
      .status-failed {
        color: #991b1b;
      }
      .control {
        margin-top: 10px;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .control label {
        font-size: 12px;
        color: #444;
      }
      .control select {
        width: 100%;
        padding: 8px;
        font-size: 13px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        background: #fff;
        color: #111;
      }
      .hint {
        font-size: 11px;
        color: #666;
        margin: 4px 0 0 0;
      }
      .debug {
        font-size: 11px;
        color: #666;
        margin: 4px 0 0 0;
        font-family: ui-monospace, SFMono-Regular, monospace;
        word-break: break-all;
      }
      button {
        margin-top: 10px;
        width: 100%;
        padding: 8px;
        font-size: 13px;
        border: 1px solid #111;
        background: #111;
        color: #fff;
        border-radius: 8px;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <h1>Lead Generator</h1>
    <p class="status" id="status">Menunggu...</p>
    <div class="control">
      <label for="max-items">Jumlah leads maksimum</label>
      <select id="max-items">
        <option value="20">20 leads</option>
        <option value="50" selected>50 leads</option>
        <option value="100">100 leads</option>
      </select>
      <p class="hint">Semakin besar jumlahnya, proses capture akan makin lama.</p>
    </div>
    <p class="debug" id="debug"></p>
    <button id="capture" type="button">Capture dari tab ini</button>
    <script src="popup.js"></script>
  </body>
</html>
